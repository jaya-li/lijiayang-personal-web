            const apiKey = ""; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                systemInstruction: { parts: [{ text: "你是一个名为 GIGA Agent 的资深AI创意广告总监。你专注于TikTok等平台的电商场景。请根据用户的需求和提供的参考策略，给出精简、专业、具有洞察力的创意建议或修改方案。回复语言为中文。尽量简短且排版清晰，可以使用 Markdown 语法如加粗等。" }] }
            };

            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < 6; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，我暂时无法生成内容。";
                } catch (error) {
                    if (i === 5) return "网络请求超时，请稍后再试。";
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }
        };

                    <div style={{ display:"flex", alignItems:"center", gap:2, background:T.surface, border:`1px solid ${T.border}`, borderRadius:10, padding:"4px 6px", pointerEvents:"auto", boxShadow:`0 2px 12px rgba(0,0,0,${T.dark?0.4:0.06})` }}>
                        <ToolbarIconBtn label="文本" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>} />
                        <ToolbarIconBtn label="素材库" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>} />
                        <ToolbarIconBtn label="图形" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>} />
                        <ToolbarIconBtn label="画笔" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>} />

                        <ToolbarIconBtn label="分享给他人协作" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>} />
                        <ToolbarIconBtn label="导入Figma" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 5.5A3.5 3.5 0 0 1 8.5 2H12v7H8.5A3.5 3.5 0 0 1 5 5.5z"/><path d="M12 2h3.5a3.5 3.5 0 1 1 0 7H12V2z"/><path d="M12 12.5a3.5 3.5 0 1 1 7 0 3.5 3.5 0 1 1-7 0z"/><path d="M5 19.5A3.5 3.5 0 0 1 8.5 16H12v3.5a3.5 3.5 0 1 1-7 0z"/><path d="M5 12.5A3.5 3.5 0 0 1 8.5 9H12v7H8.5A3.5 3.5 0 0 1 5 12.5z"/></svg>} />
                    </div>

                    {/* Right: Generate Button */}
                    <div style={{ display:"flex", alignItems:"center", pointerEvents:"auto" }}>
                        <button style={{ padding:"6px 14px", borderRadius:7, border:"none", background:T.accentBg, color:T.accentFg, fontSize:11, fontWeight:500, cursor:"pointer" }}>▶ Generate</button>
                    </div>

            );
        };

        // ─── Groot Canvas ───
        function GrootCanvas({ historyId, historyItem, onBack, isAgentChatOpen, setIsAgentChatOpen }) {
            const T = useTheme();
            
            // Interactive nodes state mapping
            const [canvasNodes, setCanvasNodes] = useState(() => makeNodes(historyId));
            const [canvasEdges, setCanvasEdges] = useState(() => EDGES[historyId] || []);
            const [selectedNode, setSelectedNode] = useState(null);
            const [resizing, setResizing] = useState(null);

            // -- Canvas Pan & Zoom State --
            const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
            const transformRef = useRef(transform);
            transformRef.current = transform;
            const [isPanning, setIsPanning] = useState(false);
            const [isSpaceDown, setIsSpaceDown] = useState(false);
            const canvasRef = useRef(null);
            const panStart = useRef({ x: 0, y: 0 });

            // -- Node Drag State --
            const [positions, setPositions] = useState(() => Object.fromEntries(canvasNodes.map(n => [n.id, {x:n.x, y:n.y}])));
            const [dragging, setDragging] = useState(null);
            const dragOffset = useRef({});
            
            // Environment modes
            const isPromoDataAgent = historyId === "promo_data_agent";
            const isPromoAgent = historyId === "promo_agent_canvas";
            const isShopMockupAgent = historyId === "shop_mockup_agent";
            const isIncentiveAgent = historyId === "incentive_agent_canvas";
            const isCodingAgent = historyId === "coding_agent_canvas";
            const isDirectorAgent = historyId === "director_agent_canvas";
            const isStandard = !isPromoDataAgent && !isPromoAgent && !isShopMockupAgent && !isIncentiveAgent && !isCodingAgent && !isDirectorAgent;
            
            const [reference, setReference] = useState(null);
            const [chatInput, setChatInput] = useState("");
            
            // Sync specific canvas properties
            const [activeAgent, setActiveAgent] = useState(() => {
                if (isPromoDataAgent) return "推广图Agent";
                if (isPromoAgent) return "推广图Agent";
                if (isShopMockupAgent) return "商店图Agent";
                if (isIncentiveAgent) return "Incentive玩法Agent";
                if (isCodingAgent) return "AI Coding Agent";
                if (isDirectorAgent) return "视频生成";
                return "标准模式";
            });
            const [dataAgentActive, setDataAgentActive] = useState(isPromoDataAgent);
            const [mockupOpen, setMockupOpen] = useState(false);
            const [mockupSelection, setMockupSelection] = useState(isShopMockupAgent ? "Main ROW" : "");
            const [gameplayOpen, setGameplayOpen] = useState(false);
            const [gameplaySelection, setGameplaySelection] = useState(isIncentiveAgent ? "冲榜" : "");
            const [modulesOpen, setModulesOpen] = useState(false);
            const [modulesSelection, setModulesSelection] = useState(isIncentiveAgent ? ["Feed banner"] : []);
            const [modeOpen, setModeOpen] = useState(false);
            const [spawnMenuOpen, setSpawnMenuOpen] = useState(null);
            // Director canvas: drag-to-connect state
            const [connectingFrom, setConnectingFrom] = useState(null); // { nodeId, startX, startY }
            const [connectingPos, setConnectingPos] = useState(null);   // { x, y } in canvas coords
            // Director canvas: frame resize state
            const [resizingFrame, setResizingFrame] = useState(null);   // { frameId, startMX, startMY, startW, startH }
            // Video generation options (used in canvas chatbox)
            const [videoDirectorMode, setVideoDirectorMode] = useState(false);
            const [videoModelOpen, setVideoModelOpen] = useState(false);
            const [videoModel, setVideoModel] = useState(VIDEO_MODELS[0]);
            const [videoStatusOpen, setVideoStatusOpen] = useState(false);
            const [videoStatus, setVideoStatus] = useState("");
            const [videoRatioOpen, setVideoRatioOpen] = useState(false);
            const [videoRatio, setVideoRatio] = useState("");
            const [videoDurationOpen, setVideoDurationOpen] = useState(false);
            const [videoDuration, setVideoDuration] = useState("");

            // ── Gemini Chat State ──
            const [chatHistory, setChatHistory] = useState(() => {
                if (isPromoDataAgent) {
                    return [{ role: 'assistant', text: '已为您应用 **Top-DNU 数据智荐** 策略。\n\n分析近期高转化素材发现，使用高对比度色彩和放大产品特写能提升 **15%** 的点击率。已在左侧画布中为您提取符合该策略的视觉特征，您可以直接点击左侧图片引用为生成参考。' }];
                } else if (isPromoAgent) {
                    return [{ role: 'assistant', text: '已进入 **推广图 Agent** 画布（未启用数据智荐）。\n\n你可以在左侧节点上点击 **+** 拉出变体分支，也可以直接在右侧对话框描述需求，我会给出更聚焦的视觉方案与 Prompt。' }];
                } else if (isShopMockupAgent) {
                    return [{ role: 'assistant', text: '已为您应用 **商店图 Agent** 策略。\n\n根据所选的 Mock up 布局，已生成 4 张 9:16 竖版矩阵预览图。您可以悬停在图片上使用快捷编辑工具，或直接向我发送修改指令。' }];
                } else if (isIncentiveAgent) {
                    return [{ role: 'assistant', text: '已为您应用 **Incentive 玩法 Agent** 策略。\n\n根据您选择的玩法和模块，已在画布中生成 10 张正方形（1:1）素材。您可以直接点击每张图下方的 Prompt 进行单独的修改并重新生成。' }];
                } else if (isCodingAgent) {
                    return [{ role: 'assistant', text: '已进入 **AI Coding Agent** 画布。\n\n左侧包含 **Text input** 与 **Image input** 两个输入节点，并连接到 **Code + Preview** 组合节点。\n- 你可以拖拽节点右下角 ↘ 调整尺寸\n- 点击组合节点右上角按钮在「代码/预览」间切换\n- 点击 **Generate** 会把输入汇总并生成一版代码与预览（当前为 mock，可继续接真实执行/渲染）' }];
                } else if (isDirectorAgent) {
                    return [{ role: 'assistant', text: '已进入 **导演模式 Agent** 画布 🎬\n\n已为你规划四阶段制作流程：**脚本 → 分镜 → 图片 → 视频**，并生成了 4 个脚本方向供你选择。\n\n**点击画布中的方向卡片**选择你感兴趣的脚本路线，也可以告诉我你的想法，我来为你定制更符合需求的方向。' }];
                } else {
                    return [{ role: 'assistant', text: '你好！我是 GIGA Agent。需要对当前画布中的节点或排版做些什么调整吗？' }];
                }
            });
            const [isGenerating, setIsGenerating] = useState(false);
            const chatEndRef = useRef(null);

            const selNode = canvasNodes.find(n => n.id===selectedNode);

            // Spacebar detection for panning
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.code === 'Space' && !isSpaceDown && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                        e.preventDefault();
                        setIsSpaceDown(true);
                    }
                };
                const handleKeyUp = (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        setIsSpaceDown(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                }
            }, [isSpaceDown]);

            // ── All canvas interaction via refs (no stale closures) ──
            const draggingRef = useRef(null);
            const isPanningRef = useRef(false);
            const resizingRef = useRef(null);
            const resizingFrameRef = useRef(null);
            const connectingFromRef = useRef(null);
            const positionsRef = useRef(positions);
            positionsRef.current = positions;
            const canvasNodesRef = useRef(canvasNodes);
            canvasNodesRef.current = canvasNodes;

            // Wheel handler for zoom/pan (stable, uses refs)
            const handleCanvasWheel = useCallback((e) => {
                e.preventDefault();
                const prev = transformRef.current;
                if (e.ctrlKey || e.metaKey) {
                    const scaleBy = Math.exp(-e.deltaY / 200);
                    const canvas = canvasRef.current;
                    const rect = canvas ? canvas.getBoundingClientRect() : { left: 0, top: 0 };
                    const mx = e.clientX - rect.left;
                    const my = e.clientY - rect.top;
                    let ns = Math.min(Math.max(0.05, prev.scale * scaleBy), 5);
                    const newT = { x: mx - (mx - prev.x) / prev.scale * ns, y: my - (my - prev.y) / prev.scale * ns, scale: ns };
                    transformRef.current = newT;
                    setTransform(newT);
                } else {
                    const newT = { x: prev.x - e.deltaX, y: prev.y - e.deltaY, scale: prev.scale };
                    transformRef.current = newT;
                    setTransform(newT);
                }
            }, []);

            // Attach wheel to canvas DOM (non-passive so preventDefault works)
            useEffect(() => {
                const el = canvasRef.current;
                if (el) {
                    el.addEventListener('wheel', handleCanvasWheel, { passive: false });
                    return () => el.removeEventListener('wheel', handleCanvasWheel);
                }
            });

            // Ref callback to set canvasRef
            const canvasRefCallback = useCallback((el) => {
                canvasRef.current = el;
            }, []);

            // Initial centering
            useEffect(() => {
                const init = isShopMockupAgent ? { x: 50, y: 100, scale: 0.8 }
                    : isIncentiveAgent ? { x: 50, y: 50, scale: 0.85 }
                    : isDirectorAgent ? { x: -80, y: -10, scale: 0.68 }
                    : { x: 0, y: 0, scale: 1 };
                setTransform(init);
                transformRef.current = init;
            }, [historyId]);

            // Mouse events for Canvas Pan & Node Drag
            const onCanvasMouseDown = useCallback((e) => {
                setSpawnMenuOpen(null);
                if (e.button === 0 || e.button === 1 || isSpaceDown) {
                    const t = transformRef.current;
                    isPanningRef.current = true;
                    setIsPanning(true);
                    panStart.current = { x: e.clientX - t.x, y: e.clientY - t.y };
                    setSelectedNode(null);
                }
            }, [isSpaceDown]);

            const onNodeMouseDown = useCallback((e, nodeId) => {
                if (connectingFromRef.current) return;
                e.stopPropagation();
                const t = transformRef.current;
                const pos = positionsRef.current[nodeId];
                const nodeScreenX = t.x + pos.x * t.scale;
                const nodeScreenY = t.y + pos.y * t.scale;
                dragOffset.current = { dx: e.clientX - nodeScreenX, dy: e.clientY - nodeScreenY };
                draggingRef.current = nodeId;
                setDragging(nodeId);
                setSelectedNode(nodeId);
            }, []);

            // Single stable mousemove/mouseup — never re-created
            useEffect(() => {
                const onMove = (e) => {
                    const t = transformRef.current;
                    if (draggingRef.current) {
                        const id = draggingRef.current;
                        setPositions(p => ({
                            ...p,
                            [id]: {
                                x: (e.clientX - dragOffset.current.dx - t.x) / t.scale,
                                y: (e.clientY - dragOffset.current.dy - t.y) / t.scale
                            }
                        }));
                    } else if (resizingRef.current) {
                        const { id, startX, startY, startW, startH, minH = 160 } = resizingRef.current;
                        const dx = (e.clientX - startX) / t.scale;
                        const dy = (e.clientY - startY) / t.scale;
                        setCanvasNodes(prev => prev.map(n => n.id === id
                            ? { ...n, width: Math.max(120, Math.round(startW + dx)), height: Math.max(minH, Math.round(startH + dy)) }
                            : n));
                    } else if (resizingFrameRef.current) {
                        const { frameId, startMX, startMY, startW, startH } = resizingFrameRef.current;
                        const dx = (e.clientX - startMX) / t.scale;
                        const dy = (e.clientY - startMY) / t.scale;
                        setCanvasNodes(prev => prev.map(n => n.id === frameId
                            ? { ...n, width: Math.max(120, Math.round(startW + dx)), height: Math.max(80, Math.round(startH + dy)) }
                            : n));
                    } else if (connectingFromRef.current) {
                        const canvas = canvasRef.current;
                        if (canvas) {
                            const rect = canvas.getBoundingClientRect();
                            setConnectingPos({
                                x: (e.clientX - rect.left - t.x) / t.scale,
                                y: (e.clientY - rect.top  - t.y) / t.scale,
                            });
                        }
                    } else if (isPanningRef.current) {
                        const newT = {
                            x: e.clientX - panStart.current.x,
                            y: e.clientY - panStart.current.y,
                            scale: t.scale
                        };
                        transformRef.current = newT;
                        setTransform(newT);
                    }
                };
                const onUp = (e) => {
                    if (connectingFromRef.current) {
                        const canvas = canvasRef.current;
                        const t = transformRef.current;
                        if (canvas) {
                            const rect = canvas.getBoundingClientRect();
                            const cx = (e.clientX - rect.left - t.x) / t.scale;
                            const cy = (e.clientY - rect.top  - t.y) / t.scale;
                            const nodes = canvasNodesRef.current;
                            const poss = positionsRef.current;
                            const targetNode = nodes.find(n => {
                                if (n.type !== "director_node") return false;
                                if (n.id === connectingFromRef.current.nodeId) return false;
                                const p = poss[n.id];
                                if (!p) return false;
                                return cx >= p.x && cx <= p.x + (n.width||204) && cy >= p.y && cy <= p.y + (n.height||64);
                            });
                            if (targetNode) {
                                setCanvasEdges(prev => {
                                    const exists = prev.some(([f,t]) => f === connectingFromRef.current.nodeId && t === targetNode.id);
                                    return exists ? prev : [...prev, [connectingFromRef.current.nodeId, targetNode.id]];
                                });
                            }
                        }
                        connectingFromRef.current = null;
                        setConnectingFrom(null);
                        setConnectingPos(null);
                    }
                    draggingRef.current = null;
                    resizingRef.current = null;
                    resizingFrameRef.current = null;
                    isPanningRef.current = false;
                    setDragging(null);
                    setResizing(null);
                    setResizingFrame(null);
                    setIsPanning(false);
                };
                window.addEventListener("mousemove", onMove);
                window.addEventListener("mouseup", onUp);
                return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
            }, []);

            const onResizeHandleDown = useCallback((e, nodeId) => {
                e.stopPropagation();
                e.preventDefault();
                const n = canvasNodesRef.current.find(x => x.id === nodeId);
                if (!n) return;
                setSelectedNode(nodeId);
                const minH = n.type === "director_node" ? 40 : 160;
                const r = {
                    id: nodeId,
                    startX: e.clientX,
                    startY: e.clientY,
                    startW: n.width || 360,
                    startH: n.height || 260,
                    minH,
                };
                resizingRef.current = r;
                setResizing(r);
            }, []);

            const handleCodingTogglePane = (nodeId, pane) => {
                setCanvasNodes(prev => prev.map(n => n.id === nodeId ? { ...n, pane } : n));
            };

            const handleCodingTextChange = (nodeId, value) => {
                setCanvasNodes(prev => prev.map(n => n.id === nodeId ? { ...n, value } : n));
            };

            const handleCodingImagePick = (nodeId, file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    const dataUrl = String(reader.result || "");
                    setCanvasNodes(prev => prev.map(n => n.id === nodeId ? { ...n, imageDataUrl: dataUrl } : n));
                };
                reader.readAsDataURL(file);
            };

            const handleCodingVideoPick = (nodeId, file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    const dataUrl = String(reader.result || "");
                    setCanvasNodes(prev => prev.map(n => n.id === nodeId ? { ...n, videoDataUrl: dataUrl } : n));
                };
                reader.readAsDataURL(file);
            };

            const handleSpawnCodingNode = (parentId, type) => {
                const parentPos = positions[parentId];
                const parentNode = canvasNodes.find(n => n.id === parentId);
                const newId = type + '_' + Date.now();
                let newNode = {};
                if (type === 'text') {
                    newNode = { id: newId, label: "Text input", type: "coding_text", width: 280, height: 190, value: "" };
                } else if (type === 'image') {
                    newNode = { id: newId, label: "Image input", type: "coding_image", width: 280, height: 210, imageDataUrl: "" };
                } else if (type === 'video') {
                    newNode = { id: newId, label: "Video input", type: "coding_video", width: 280, height: 210, videoDataUrl: "" };
                } else if (type === 'combo') {
                    newNode = { id: newId, label: "Code + Preview", type: "coding_combo", width: 560, height: 410, pane: "code", code: "", previewHtml: "" };
                }

                setCanvasNodes(prev => [...prev, newNode]);
                setPositions(prev => ({...prev, [newId]: { x: parentPos.x + (parentNode.width||360) + 60, y: parentPos.y }}));
                setCanvasEdges(prev => [...prev, [parentId, newId]]);
                setSelectedNode(newId);
                setSpawnMenuOpen(null);
            };

            const handleCodingGenerate = (comboNodeId) => {
                const textNode = canvasNodes.find(n => n.type === "coding_text");
                const imgNode = canvasNodes.find(n => n.type === "coding_image");
                const spec = (textNode && textNode.value) ? String(textNode.value) : "";
                const hasImg = !!(imgNode && imgNode.imageDataUrl);
                const code = [
                    `// Spec: ${spec.replace(/\n/g, " ").slice(0, 160)}${spec.length > 160 ? "…" : ""}`,
                    ``,
                    `const spec = ${JSON.stringify(spec)};`,
                    `const hasImage = ${hasImg};`,
                    ``,
                    `export function render() {`,
                    `  const title = "GIGA Demo Landing";`,
                    `  const points = [`,
                    `    "清晰的信息层级：标题 / 卖点 / CTA",`,
                    `    "暗色玻璃拟态：柔和渐变 + 轻微模糊",`,
                    `    "移动端优先：可读性优先、留白充足",`,
                    `  ];`,
                    `  return { title, points, cta: "Start now" };`,
                    `}`,
                ].join("\n");
                const safeSpec = spec
                    ? spec.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br/>")
                    : "（从左侧 Text input 输入需求后点击 Generate）";
                const imgBlock = hasImg
                    ? `<div class="img"><img src="${imgNode.imageDataUrl}" alt="ref"/></div>`
                    : "";
                const previewHtml = `<!doctype html>
<html>

                                    if (node.type === "director_prompt") {
                                        return (
                                            <div key={node.id} onMouseDown={stopBubble}
                                                style={{ ...baseStyle, height: H, borderRadius: H / 2, background: T.dark ? "rgba(60,60,80,0.55)" : "rgba(210,210,230,0.7)", border:`1px solid ${T.borderHover}`, backdropFilter:"blur(8px)", display:"flex", alignItems:"center", justifyContent:"center", padding:"0 28px", cursor:"default" }}>
                                                <span style={{ fontSize:13, color:T.text, textAlign:"center", lineHeight:1.5 }}>{node.label}</span>
                                            </div>
                                        );
                                    }

                                    /* ── Todos card ── */
                                    if (node.type === "director_todos") {
                                        const doneCount = (node.todos||[]).filter(t=>t.done).length;
                                        return (
                                            <div key={node.id} onMouseDown={stopBubble}
                                                style={{ ...baseStyle, height: H, borderRadius:14, background:T.surface, border:`1px solid ${T.border}`, overflow:"hidden", cursor:"default" }}>
                                                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"11px 16px", borderBottom:`1px solid ${T.border}` }}>
                                                    <span style={{ fontSize:12, color:T.textMuted, display:"flex", alignItems:"center", gap:6 }}>
                                                        <span style={{ fontSize:14, opacity:0.7 }}>≡</span> To-dos
                                                    </span>
                                                    <span style={{ fontSize:11, color:T.textFaint, background:T.bgSubtle, padding:"1px 7px", borderRadius:10, border:`1px solid ${T.border}` }}>{doneCount} of 4</span>
                                                </div>
                                                <div style={{ padding:"10px 16px", display:"flex", flexDirection:"column", gap:9 }}>
                                                    {(node.todos||[]).map((item,ti) => (
                                                        <div key={ti} style={{ display:"flex", alignItems:"center", gap:10 }}>
                                                            <div style={{ width:15, height:15, borderRadius:"50%", border:`1.5px solid ${item.done ? T.purple : T.borderHover}`, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", background: item.done ? T.purple+"22" : "transparent" }}>
                                                                {item.done && <div style={{ width:7, height:7, borderRadius:"50%", background:T.purple }} />}
                                                            </div>
                                                            <span style={{ fontSize:12, color: item.done ? T.text : T.textMuted, textDecoration: item.done ? "line-through" : "none", opacity: item.done ? 0.6 : 1 }}>{ti+1}. {item.label}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    }

                                    /* ── Direction cards (click to select) ── */
                                    if (node.type === "director_direction") {
                                        const nc = numColors[node.num - 1] || T.purple;
                                        const isSelected = node.selected;
                                        return (
                                            <div key={node.id} onMouseDown={stopBubble}
                                                onClick={e => { e.stopPropagation(); handleDirectorSelectDirection(node); }}
                                                style={{ ...baseStyle, height: H, borderRadius:12, background: isSelected ? (T.dark ? `${nc}18` : `${nc}0c`) : T.surface, border:`2px solid ${isSelected ? nc : T.border}`, padding:"14px 16px", cursor:"pointer" }}>
                                                <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
                                                    <div style={{ width:22, height:22, borderRadius:"50%", background: nc, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:11, fontWeight:700, color:"#fff" }}>
                                                        {node.num}
                                                    </div>
                                                    <div>
                                                        <div style={{ fontSize:12, fontWeight:600, color:T.text, marginBottom:6 }}>
                                                            方向{["一","二","三","四"][node.num-1]} {node.title}：
                                                        </div>
                                                        <div style={{ fontSize:11, color:T.textMuted, lineHeight:1.65 }}>{node.desc}</div>
                                                    </div>
                                                </div>
                                                {isSelected && <div style={{ position:"absolute", top:8, right:10, fontSize:10, color:nc, fontWeight:600 }}>✓ 已选</div>}
                                            </div>
                                        );
                                    }

                                    /* ── Script cards (click to select) ── */
                                    if (node.type === "director_script") {
                                        const nc = numColors[node.num - 1] || T.purple;
                                        const isSelected = node.selected;
                                        return (
                                            <div key={node.id} onMouseDown={stopBubble}
                                                onClick={e => { e.stopPropagation(); handleDirectorSelectScript(node); }}
                                                style={{ ...baseStyle, height: H, borderRadius:12, background: isSelected ? (T.dark ? `${nc}18` : `${nc}0c`) : T.surface, border:`1.5px solid ${isSelected ? nc : T.border}`, padding:"12px 14px", cursor:"pointer" }}>
                                                <div style={{ fontSize:12, fontWeight:600, color:T.text, marginBottom:6, display:"flex", alignItems:"center", gap:6 }}>
                                                    <span style={{ fontSize:10, color:nc, fontFamily:"monospace" }}>0{node.num}</span>
                                                    {node.title}
                                                </div>
                                                <div style={{ fontSize:11, color:T.textMuted, lineHeight:1.6 }}>{node.content}</div>
                                                {isSelected && <div style={{ position:"absolute", top:8, right:10, fontSize:10, color:nc, fontWeight:600 }}>✓</div>}
                                            </div>
                                        );
                                    }

                                    /* ── Storyboard cards (editable content, click header to generate) ── */
                                    if (node.type === "director_storyboard") {
                                        return (
                                            <div key={node.id} onMouseDown={stopBubble}
                                                style={{ ...baseStyle, height: H, borderRadius:12, background: T.surface, border:`1.5px solid ${isSel ? "#f59e0b" : T.border}`, padding:0, overflow:"hidden", cursor:"default" }}>
                                                {/* Header row — click to generate images */}
                                                <div onClick={e => { e.stopPropagation(); handleDirectorGenerateImages(node); }}
                                                    style={{ display:"flex", borderBottom:`1px solid ${T.border}`, background: T.dark ? "rgba(255,255,255,0.03)" : T.bgSubtle, cursor:"pointer" }}>
                                                    <div style={{ flex:"0 0 60px", padding:"8px 10px", borderRight:`1px solid ${T.border}`, fontSize:11, color:T.textMuted }}>
                                                        <div style={{ fontSize:9, color:T.textFaint, marginBottom:2 }}>镜头</div>
                                                        <div style={{ fontWeight:600, color:T.text }}>{node.shot}</div>
                                                    </div>
                                                    <div style={{ flex:"0 0 80px", padding:"8px 10px", fontSize:11, color:T.textMuted }}>
                                                        <div style={{ fontSize:9, color:T.textFaint, marginBottom:2 }}>时间</div>
                                                        <div style={{ fontWeight:600, color:T.text, fontFamily:"monospace", fontSize:10 }}>{node.time}</div>
                                                    </div>
                                                    <div style={{ marginLeft:"auto", padding:"8px 10px", display:"flex", alignItems:"center" }}>
                                                        <span style={{ fontSize:9, color:"#f59e0b", background:"#f59e0b22", padding:"2px 6px", borderRadius:8 }}>▶ 生成图片</span>
                                                    </div>
                                                </div>
                                                {/* Editable content area — does NOT trigger generation */}
                                                <div style={{ padding:"10px 12px" }}>
                                                    <div style={{ fontSize:9, color:T.textFaint, marginBottom:4 }}>分镜内容</div>
                                                    <div contentEditable suppressContentEditableWarning
                                                        onClick={e => e.stopPropagation()}
                                                        onMouseDown={e => e.stopPropagation()}
                                                        onBlur={e => {
                                                            const newContent = e.target.innerText;
                                                            setCanvasNodes(prev => prev.map(n => n.id === node.id ? { ...n, content: newContent } : n));
                                                        }}
                                                        style={{ fontSize:11, color:T.text, lineHeight:1.6, outline:"none", minHeight:40, cursor:"text", borderRadius:6, padding:"4px 6px", background: T.dark ? "rgba(255,255,255,0.03)" : "rgba(0,0,0,0.02)", border:`1px solid transparent`, transition:"border-color 0.15s" }}
                                                    >{node.content}</div>
                                                </div>
                                            </div>
                                        );
                                    }

                                    /* ── Generated storyboard images ── */
                                    if (node.type === "director_image") {
                                        const isGen = node.status === "generating";
                                        return (
                                            <div key={node.id} onMouseDown={stopBubble}
                                                style={{ ...baseStyle, height: H, borderRadius:12, background: T.surface, border:`1.5px solid ${isSel ? "#10b981" : T.border}`, overflow:"hidden", cursor:"default" }}>
                                                <div style={{ height: H - 36, background: T.dark ? "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)" : "linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 50%, #a5b4fc 100%)", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
                                                    {isGen ? (
                                                        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                                                            <div style={{ width:24, height:24, border:`2px solid ${T.borderHover}`, borderTopColor:T.purple, borderRadius:"50%", animation:"spin 1s linear infinite" }} />
                                                            <span style={{ fontSize:10, color:T.textMuted }}>生成中...</span>
                                                        </div>
                                                    ) : (
                                                        <React.Fragment>
                                                            <div style={{ fontSize:36, opacity:0.3 }}>🖼</div>
                                                            <div style={{ position:"absolute", top:6, right:6, fontSize:9, background:"#10b98133", color:"#10b981", padding:"2px 6px", borderRadius:8 }}>✓ 已生成</div>
                                                        </React.Fragment>
                                                    )}
                                                </div>
                                                <div style={{ height:36, display:"flex", alignItems:"center", padding:"0 10px", fontSize:11, color:T.text, borderTop:`1px solid ${T.border}` }}>
                                                    {node.label}
                                                </div>
                                            </div>
                                        );
                                    }

                                    /* ── Final video node ── */
                                    if (node.type === "director_video") {
                                        const isGen = node.status === "generating";
                                        const isDone = node.status === "done";
                                        return (
                                            <div key={node.id} onMouseDown={stopBubble}
                                                style={{ ...baseStyle, height: H, borderRadius:16, background: T.surface, border:`2px solid ${isDone ? "#8b5cf6" : T.border}`, overflow:"hidden", cursor:"default" }}>
                                                <div style={{ height: H - 48, background: T.dark ? "linear-gradient(135deg, #0f0f23 0%, #1a0533 50%, #0d1b2a 100%)" : "linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #ddd6fe 100%)", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
                                                    {isGen ? (
                                                        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                                                            <div style={{ width:32, height:32, border:`2px solid ${T.borderHover}`, borderTopColor:"#8b5cf6", borderRadius:"50%", animation:"spin 1s linear infinite" }} />
                                                            <span style={{ fontSize:11, color:T.textMuted }}>视频合成中...</span>
                                                        </div>
                                                    ) : isDone ? (
                                                        <React.Fragment>
                                                            <div style={{ width:56, height:56, borderRadius:"50%", background:"rgba(139,92,246,0.2)", border:"2px solid rgba(139,92,246,0.4)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>
                                                                <span style={{ fontSize:24, marginLeft:4 }}>▶</span>
                                                            </div>
                                                            <div style={{ position:"absolute", top:8, right:10, fontSize:10, background:"#8b5cf633", color:"#8b5cf6", padding:"2px 8px", borderRadius:8, fontWeight:600 }}>✓ 合成完成</div>
                                                            <div style={{ position:"absolute", bottom:8, left:10, fontSize:10, color:T.textMuted, fontFamily:"monospace" }}>0:30 · 1920×1080</div>
                                                        </React.Fragment>
                                                    ) : null}
                                                </div>
                                                <div style={{ height:48, display:"flex", alignItems:"center", padding:"0 14px", fontSize:12, color:T.text, fontWeight:600, borderTop:`1px solid ${T.border}`, gap:8 }}>
                                                    <span style={{ fontSize:16 }}>🎬</span> {node.label}
                                                </div>
                                            </div>
                                        );
                                    }

                                    return null;
                                })}

                                {/* ── Director: Generate Video button (shown when all images are done) ── */}
                                {isDirectorAgent && canvasNodes.some(n => n.type === "director_image" && n.status === "done") && !canvasNodes.some(n => n.type === "director_video") && (() => {
                                    const lastImg = canvasNodes.filter(n => n.type === "director_image").pop();
                                    const lastPos = positions[lastImg?.id];
                                    if (!lastPos || !lastImg) return null;
                                    const btnY = lastPos.y + (lastImg.height || 160) + 30;
                                    const btnX = 590 - 110;
                                    return (
                                        <div onClick={handleDirectorGenerateVideo}
                                            style={{ position:"absolute", left: btnX, top: btnY, width: 220, padding:"12px 0", borderRadius:12, background:"linear-gradient(135deg, #7c3aed, #8b5cf6, #a78bfa)", color:"#fff", fontSize:13, fontWeight:600, textAlign:"center", cursor:"pointer", boxShadow:"0 4px 20px rgba(139,92,246,0.4)", transition:"transform 0.15s, box-shadow 0.15s", userSelect:"none" }}
                                            onMouseEnter={e => { e.currentTarget.style.transform="scale(1.04)"; e.currentTarget.style.boxShadow="0 6px 28px rgba(139,92,246,0.55)"; }}
                                            onMouseLeave={e => { e.currentTarget.style.transform="scale(1)"; e.currentTarget.style.boxShadow="0 4px 20px rgba(139,92,246,0.4)"; }}
                                        >
                                            🎬 合成完整视频
                                        </div>
                                    );
                                })()}

                                </div>{/* ← Close Transform Container */}

                                {/* ── OLD Director code removed ── */}
                                {false && canvasNodes.filter(n => n.type === "director_frame").map(frame => {
                                    const pos = positions[frame.id];
                                    const subNodes = canvasNodes.filter(n => n.type === "director_node" && n.fi === frame.stageNum - 1);
                                    const allDone = subNodes.length > 0 && subNodes.every(n => n.status === "done");
                                    const anyGenerating = subNodes.some(n => n.status === "generating");
                                    const allWaiting = subNodes.every(n => n.status === "waiting");
                                    const borderColor = allWaiting ? T.border : anyGenerating ? `${frame.accent}80` : allDone ? `${frame.accent}cc` : `${frame.accent}55`;
                                    const isResizingThis = resizingFrame?.frameId === frame.id;
                                    return (
                                        <div key={frame.id} style={{
                                            position:"absolute", left: pos?.x||0, top: pos?.y||0,
                                            width: frame.width, height: frame.height,
                                            border: `1px solid ${isResizingThis ? frame.accent : borderColor}`,
                                            background: allWaiting ? "transparent" : `${frame.accent}07`,
                                            borderRadius: 6,
                                            transition: "border-color 0.4s, background 0.4s",
                                            overflow: "visible",
                                            cursor: dragging === frame.id ? "grabbing" : "default",
                                        }}>
                                            {/* Frame label — Figma style: shown above the frame border */}
                                            <div
                                                onMouseDown={e => onNodeMouseDown(e, frame.id)}
                                                style={{ position:"absolute", top:-26, left:0, display:"flex", alignItems:"center", gap:5, whiteSpace:"nowrap", cursor:"grab", userSelect:"none" }}
                                            >
                                                <div style={{ width:16, height:16, borderRadius:4, border:`1px solid ${allWaiting ? T.borderHover : frame.accent}`, background: allWaiting ? "transparent" : `${frame.accent}20`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, fontWeight:700, color: allWaiting ? T.textFaint : frame.accent, transition:"all 0.4s" }}>
                                                    {frame.stageNum}
                                                </div>
                                                <span style={{ fontSize:11, fontWeight:600, color: allWaiting ? T.textFaint : frame.accent, letterSpacing:"0.01em", transition:"color 0.4s" }}>
                                                    {frame.label}
                                                </span>
                                                {anyGenerating && <span style={{ fontSize:9, color:"#f59e0b" }}>生成中…</span>}
                                                {allDone && <span style={{ fontSize:9, color: frame.accent }}>✓ 完成</span>}
                                            </div>
                                            {/* Resize handle — bottom-right corner */}
                                            <div
                                                onMouseDown={e => {
                                                    e.stopPropagation();
                                                    e.preventDefault();
                                                    const rf = { frameId: frame.id, startMX: e.clientX, startMY: e.clientY, startW: frame.width, startH: frame.height };
                                                    resizingFrameRef.current = rf;
                                                    setResizingFrame(rf);
                                                }}
                                                style={{ position:"absolute", bottom:-4, right:-4, width:12, height:12, borderRadius:3, background: frame.accent, border:`2px solid ${T.surface}`, cursor:"nwse-resize", opacity: allWaiting ? 0.3 : 0.75, zIndex:10 }}
                                            />
                                        </div>
                                    );
                                })}

                                {/* ── OLD Director sub-nodes removed ── */}
                                {false && canvasNodes.filter(n => n.type === "director_node").map(node => {
                                    const pos = positions[node.id];
                                    const isSel = selectedNode === node.id;
                                    const isWaiting = node.status === "waiting";
                                    const isGenerating = node.status === "generating";
                                    const isDone = node.status === "done";
                                    const isIdle = node.status === "idle";
                                    const dotColor = isWaiting ? T.borderHover : isGenerating ? "#f59e0b" : isDone ? "#059669" : node.accent;
                                    return (
                                        <div
                                            key={node.id}
                                            onMouseDown={e => onNodeMouseDown(e, node.id)}
                                            onClick={() => setSelectedNode(node.id)}
                                            onMouseUp={e => {
                                                // window mouseup handler handles edge creation
                                                // stopPropagation here would break it, so we just let it bubble
                                            }}
                                            style={{
                                                position:"absolute", left: pos?.x||0, top: pos?.y||0,
                                                width: node.width, height: node.height,
                                                background: connectingFrom && connectingFrom.nodeId !== node.id && !isWaiting ? `${node.accent}15` : T.surface,
                                                border: `1px solid ${isSel ? node.accent : connectingFrom && !isWaiting ? `${node.accent}70` : isWaiting ? T.border : `${node.accent}40`}`,
                                                borderRadius: 8,
                                                opacity: isWaiting ? 0.45 : 1,
                                                boxShadow: isSel
                                                    ? `0 0 0 2px ${node.accent}50, 0 4px 14px rgba(0,0,0,0.4)`
                                                    : `0 2px 8px rgba(0,0,0,${T.dark?0.35:0.1})`,
                                                cursor: connectingFrom ? "crosshair" : dragging===node.id ? "grabbing" : "grab",
                                                userSelect:"none",
                                                display:"flex", alignItems:"center", padding:"0 10px", gap:7,
                                                transition: "opacity 0.3s, border-color 0.3s, box-shadow 0.2s, background 0.15s",
                                            }}
                                        >
                                            {/* Status dot */}
                                            <div style={{ width:6, height:6, borderRadius:"50%", flexShrink:0,
                                                background: dotColor,
                                                boxShadow: isGenerating ? `0 0 6px ${dotColor}` : isDone ? `0 0 4px ${dotColor}80` : "none",
                                            }} />
                                            {/* Icon */}
                                            <span style={{ fontSize:12, opacity: isWaiting ? 0.5 : 0.85, flexShrink:0 }}>{node.icon}</span>
                                            {/* Label */}
                                            <div style={{ flex:1, fontSize:11, fontWeight: node.isAgent ? 600 : 400, color: isWaiting ? T.textFaint : T.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                                                {node.label}
                                            </div>
                                            {/* Agent node: Generate button (idle) or spinner (generating) or check (done) */}
                                            {node.isAgent && isIdle && (
                                                <button
                                                    onMouseDown={e => e.stopPropagation()}
                                                    onClick={e => { e.stopPropagation(); handleDirectorGenerate(node.id); }}
                                                    style={{ padding:"2px 8px", borderRadius:4, border:`1px solid ${node.accent}`, background:"transparent", color: node.accent, fontSize:9, fontWeight:700, cursor:"pointer", flexShrink:0, whiteSpace:"nowrap" }}
                                                >▶ 运行</button>
                                            )}
                                            {node.isAgent && isGenerating && (
                                                <span style={{ fontSize:10, color:"#f59e0b", flexShrink:0, animation:"none" }}>⋯</span>
                                            )}
                                            {node.isAgent && isDone && (
                                                <button
                                                    onMouseDown={e => e.stopPropagation()}
                                                    onClick={e => { e.stopPropagation(); handleDirectorGenerate(node.id); }}
                                                    style={{ padding:"2px 7px", borderRadius:4, border:`1px solid ${node.accent}40`, background:"transparent", color: node.accent, fontSize:9, cursor:"pointer", flexShrink:0, opacity:0.7 }}
                                                >↺</button>
                                            )}
                                            {/* Non-agent done indicator */}
                                            {!node.isAgent && isDone && (
                                                <svg style={{ flexShrink:0 }} width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={node.accent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                                            )}
                                            {/* Resize handle — bottom right corner */}
                                            <div
                                                onMouseDown={e => onResizeHandleDown(e, node.id)}
                                                style={{ position:"absolute", right:0, bottom:0, width:14, height:14, cursor:"nwse-resize", display:"flex", alignItems:"flex-end", justifyContent:"flex-end", padding:"2px", zIndex:10 }}
                                            >
                                                <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 7 L7 1 M4 7 L7 4" stroke={node.accent} strokeWidth="1.5" strokeLinecap="round" opacity="0.6"/></svg>
                                            </div>
                                            {/* Right connection handle — drag to create real edge */}
                                            <div
                                                title="拖拽以连接到其他节点"
                                                onMouseDown={e => {
                                                    e.stopPropagation();
                                                    e.preventDefault();
                                                    const p = positions[node.id];
                                                    if (!p) return;
                                                    const cf = { nodeId: node.id };
                                                    connectingFromRef.current = cf;
                                                    setConnectingFrom(cf);
                                                    setConnectingPos({ x: p.x + node.width + 5, y: p.y + node.height / 2 });
                                                }}
                                                onMouseUp={e => { /* connection handled by window mouseup */ }}
                                                style={{ position:"absolute", right:-6, top:"50%", transform:"translateY(-50%)", width:12, height:12, borderRadius:"50%", background: isWaiting ? T.borderHover : node.accent, border:`2px solid ${T.surface}`, opacity: isWaiting ? 0.3 : 0.9, boxShadow: `0 0 0 1px ${isWaiting ? T.borderHover : node.accent}`, cursor:"crosshair", zIndex:10 }}
                                            />
                                        </div>
                                    );
                                })}

                                {/* Promo Data Agent Overlay Intro (not scaled) */}
                                {isPromoDataAgent && (
                                    <div style={{ position: "absolute", top: 76, left: 32, right: 32, pointerEvents: "none" }}>
                                        <div style={{ maxWidth: 980 }}>
                                            <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 16 }}>
                                                <div>
                                                    <div style={{ fontSize: 26, fontFamily: T.serif, color: T.text, marginBottom: 8 }}>推广图策略推荐 (Data-Driven Promos)</div>
                                                    <div style={{ fontSize: 13, color: T.textMuted, lineHeight: 1.6, maxWidth: 900 }}>
                                                        基于 <b style={{ color: T.purple }}>Top-DNU 数据智荐</b> 策略，系统为您检索了近期表现最佳的过往创意，并提取了核心视觉特征与 Prompt。<b>双击</b>任意节点可将策略引用至右侧对话框；每张图右侧的 <b>+</b> 可链接出新的节点分支。
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Floating Toggle Button (visible if Right Panel is fully collapsed) */}
                        {!isAgentChatOpen && rightPanelWidth === 0 && (
                            <button onClick={() => setIsAgentChatOpen(true)} style={{ position:"absolute", right:24, bottom:24, width:48, height:48, borderRadius:"50%", background:T.surface, color:T.text, border:`1px solid ${T.borderHover}`, cursor:"pointer", boxShadow:"0 8px 24px rgba(0,0,0,0.2)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:20, transition:"transform 0.2s" }} onMouseEnter={e=>e.currentTarget.style.transform="scale(1.05)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
                                <span style={{ fontSize: 18 }}>✨</span>
                            </button>

                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                                                </button>
                                                <div style={{ position:"absolute", bottom:"100%", left:"50%", transform:"translateX(-50%)", marginBottom:"8px", padding:"6px 10px", background: T.dark ? "#2a2a2a" : "#1a1a1a", color: "#fff", fontSize: 11, border: `1px solid ${T.dark ? "#3a3a3a" : "#2a2a2a"}`, borderRadius:"6px", whiteSpace:"nowrap", opacity:0, pointerEvents:"none", transition:"opacity 0.2s", zIndex:50 }} className="tooltip-box">可上传图片/视频/PRD/代码/文件</div>
                                            </div>
                                            <input 
                                                value={chatInput} 
                                                onChange={e=>setChatInput(e.target.value)} 
                                                onKeyDown={(e) => { if(e.key === 'Enter') handleSendMessage() }}
                                                placeholder="输入调整指令..." 
                                                disabled={isGenerating}
                                                style={{ flex:1, background:"transparent", border:"none", outline:"none", color:T.text, fontSize:13 }} 
                                            />
                                            <button 
                                                onClick={handleSendMessage}
                                                disabled={isGenerating || (!chatInput.trim() && !reference)}
                                                style={{ background:T.text, color:T.bg, border:"none", borderRadius:8, padding:"6px 12px", fontSize:11, fontWeight:500, cursor: (isGenerating || (!chatInput.trim() && !reference)) ? "not-allowed" : "pointer", transition:"opacity 0.2s", opacity: (isGenerating || (!chatInput.trim() && !reference)) ? 0.5 : 1 }}
                                            >
                                                ✨ 发送
                                            </button>
                                        </div>
                                    </div>
                                </React.Fragment>
                            ) : (
                                /* IF STANDARD NODE EDITOR IS OPEN */
                                isStandard && (
                                    <React.Fragment>
                                        <div style={{ padding:"18px 18px 0" }}>
                                            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
                                                <div style={{ fontSize:9, color:T.textFaint, textTransform:"uppercase", letterSpacing:"0.09em" }}>Node</div>
                                                <button onClick={() => setIsAgentChatOpen(true)} title="打开 AI 助理" style={{ background:"transparent", border:`1px solid ${T.borderHover}`, borderRadius: 6, color:T.purple, cursor:"pointer", padding:"2px 6px", fontSize:12, display:"flex", alignItems:"center" }}>✨ AI</button>
                                            </div>
                                            <div style={{ fontSize:14, fontWeight:400, fontFamily:T.serif, letterSpacing:"-0.2px", marginBottom:3, color:T.text }}>{selNode ? selNode.label : "Select a Node"}</div>
                                            <div style={{ fontSize:10, color:T.textMuted, fontFamily:T.mono, marginBottom:18 }}>{selNode ? `${selNode.type} · ${selNode.id}` : "--"}</div>
                                        </div>
                                        <div style={{ height:1, background:T.border, margin:"0 18px" }} />
                                        <div style={{ padding:"14px 18px", flex:1, overflowY:"auto" }}>
                                            {[
                                                {label:"Aspect Ratio",value:"1:1",    options:["1:1","9:16","4:5","16:9"]},
                                                {label:"Style",       value:"Product",options:["Product","Lifestyle","Editorial","Minimal"]},
                                                {label:"Background",  value:"Studio", options:["Studio","Outdoor","Abstract","Gradient"]},
                                            ].map(field => (
                                                <div key={field.label} style={{ marginBottom:14 }}>
                                                    <div style={{ fontSize:10, color:T.textMuted, marginBottom:5, textTransform:"uppercase", letterSpacing:"0.06em", opacity: selNode ? 1 : 0.4 }}>{field.label}</div>
                                                    <div style={{ display:"flex", flexWrap:"wrap", gap:4, opacity: selNode ? 1 : 0.4 }}>
                                                        {field.options.map(opt => (
                                                            <button key={opt} disabled={!selNode} style={{ padding:"4px 9px", borderRadius:5, border:`1px solid ${opt===field.value?T.accentBg:T.border}`, background:opt===field.value?T.accentBg:"transparent", color:opt===field.value?T.accentFg:T.textSub, fontSize:11, cursor:selNode?"pointer":"default", transition:"all 0.15s" }}>{opt}</button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                            <div style={{ marginBottom:14, opacity: selNode ? 1 : 0.4 }}>
                                                <div style={{ fontSize:10, color:T.textMuted, marginBottom:5, textTransform:"uppercase", letterSpacing:"0.06em" }}>Prompt</div>
                                                <textarea disabled={!selNode} rows={3} placeholder="Describe the image…" style={{ width:"100%", padding:"8px 10px", borderRadius:8, border:`1px solid ${T.border}`, background:T.bgSubtle, fontSize:12, color:T.text, resize:"none", outline:"none", fontFamily:T.sans, lineHeight:1.5 }} />
                                            </div>
                                            <button disabled={!selNode} style={{ width:"100%", padding:"9px", borderRadius:8, border:"none", background:T.accentBg, color:T.accentFg, fontSize:12, fontWeight:500, cursor:selNode?"pointer":"default", opacity: selNode ? 1 : 0.4 }}>▶ Generate Node</button>
                                        </div>
                                    </React.Fragment>
                                )
                            )}
                        </div>
                    </div>

                </div>
            );
        }

        // ─── Studio App ───
        function StudioApp({ isDark, setIsDark }) {
            const [activeNav, setActiveNav] = useState("groot");
            const [activeGroot, setActiveGroot] = useState(null);
            const [grootView, setGrootView] = useState("home");
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
            const [isAgentChatOpen, setIsAgentChatOpen] = useState(false);
            
            const tokens = makeTokens(isDark);
            const toggleDark = () => setIsDark(d => !d);
            const sidebarW = sidebarCollapsed ? SIDEBAR_CW : SIDEBAR_W;

            const handleOpenCanvas = (id) => { setActiveGroot(id); setGrootView("canvas"); };
            const handleSelectSession = (id) => { setActiveGroot(id); setGrootView("home"); };
            
            const handleStartGeneration = (prompt, agent, model, useDataAgent, mockupSelection, gameplaySelection, modulesSelection, videoDirectorMode) => {
                if (agent === "推广图Agent") {
                    setActiveGroot(useDataAgent ? "promo_data_agent" : "promo_agent_canvas");
                    setGrootView("canvas");
                    setSidebarCollapsed(true);
                    setIsAgentChatOpen(true);
                } 
                else if (agent === "商店图Agent" && mockupSelection) {
                    setActiveGroot("shop_mockup_agent");
                    setGrootView("canvas");
                    setSidebarCollapsed(true);
                    setIsAgentChatOpen(true);
                }
                else if (agent === "Incentive玩法Agent" && (gameplaySelection || modulesSelection.length > 0)) {
                    setActiveGroot("incentive_agent_canvas");
                    setGrootView("canvas");
                    setSidebarCollapsed(true);
                    setIsAgentChatOpen(true);
                } else if (agent === "AI Coding Agent") {
                    setActiveGroot("coding_agent_canvas");
                    setGrootView("canvas");
                    setSidebarCollapsed(true);
                    setIsAgentChatOpen(true);
                } else if (agent === "视频生成" && videoDirectorMode) {
                    setActiveGroot("director_agent_canvas");
                    setGrootView("canvas");
                    setSidebarCollapsed(true);
                    setIsAgentChatOpen(true);
                } else {
                    setActiveGroot("g1");
                    setGrootView("canvas");
                    setSidebarCollapsed(false);
                    setIsAgentChatOpen(false); 
                }
            };

            let activeSession = GROOT_HISTORY.find(g => g.id === activeGroot) || null;
            if (activeGroot === "promo_data_agent") {
                activeSession = { id: "promo_data_agent", name: "推广策略推荐 Canvas", time: "Just now", nodeCount: 10, status: "running" };
            } else if (activeGroot === "promo_agent_canvas") {
                activeSession = { id: "promo_agent_canvas", name: "推广图 Agent Canvas", time: "Just now", nodeCount: 3, status: "running" };
            } else if (activeGroot === "shop_mockup_agent") {
                activeSession = { id: "shop_mockup_agent", name: "商店图 Mock up", time: "Just now", nodeCount: 4, status: "running" };
            } else if (activeGroot === "incentive_agent_canvas") {
                activeSession = { id: "incentive_agent_canvas", name: "Incentive 素材矩阵", time: "Just now", nodeCount: 10, status: "running" };
            } else if (activeGroot === "coding_agent_canvas") {
                activeSession = { id: "coding_agent_canvas", name: "AI Coding Canvas", time: "Just now", nodeCount: 3, status: "running" };
            } else if (activeGroot === "director_agent_canvas") {
                activeSession = { id: "director_agent_canvas", name: "导演模式 Agent Canvas", time: "Just now", nodeCount: 4, status: "running" };
            }

            const isCanvasView = activeNav==="groot" && grootView==="canvas" && activeGroot;

            return (
                <ThemeCtx.Provider value={tokens}>
                    <div style={{ display:"flex", height:"100vh", background:tokens.bg, fontFamily:tokens.sans, transition:"background 0.25s", color: tokens.text }}>
                        <Sidebar
                            collapsed={sidebarCollapsed}
                            onToggleCollapse={() => setSidebarCollapsed(c => !c)}
                            activeNav={activeNav}
                            setActiveNav={(k) => { setActiveNav(k); if (k!=="groot") { setActiveGroot(null); setGrootView("home"); setIsAgentChatOpen(false); } }}
                            grootHistory={GROOT_HISTORY}
                            activeGroot={activeGroot}
                            setActiveGroot={setActiveGroot}
                            grootView={grootView}
                            setGrootView={setGrootView}
                            isDark={isDark}
                            toggleDark={toggleDark}
                            isAgentChatOpen={isAgentChatOpen}
                        />
                        <div style={{
                            marginLeft: sidebarW, flex:1, height:"100vh",
                            overflow: isCanvasView || ["insights","production","automation","aigclab"].includes(activeNav) ? "hidden" : "auto",
                            background: tokens.pageBg,
                            transition:"margin-left 0.22s cubic-bezier(0.4,0,0.2,1), background 0.25s",
                        }}>
                            {activeNav==="groot" && grootView==="home" && (
                                <GrootSessionHome
                                    session={activeSession && !["promo_data_agent", "shop_mockup_agent", "incentive_agent_canvas"].includes(activeSession.id) ? activeSession : null}
                                    history={GROOT_HISTORY}
                                    onOpenCanvas={handleOpenCanvas}
                                    onSelectSession={handleSelectSession}
                                    onStartGeneration={handleStartGeneration}
                                />
                            )}
                            {isCanvasView && (
                                <GrootCanvas
                                    historyId={activeGroot}
                                    historyItem={activeSession}
                                    onBack={() => { setActiveGroot(null); setGrootView("home"); setIsAgentChatOpen(false); }}
                                    isAgentChatOpen={isAgentChatOpen}
                                    setIsAgentChatOpen={setIsAgentChatOpen}
                                />
                            )}
                            {activeNav==="insights"   && <InsightsView/>}
                            {activeNav==="production" && <ProductionView/>}
                            {activeNav==="automation" && <AutomationView/>}
                            {activeNav==="aigclab"    && <AIGCLabView/>}
                            {!["insights","groot","production","automation","aigclab"].includes(activeNav) && (
                                <div style={{ padding:"40px", color:tokens.textMuted, fontSize:14 }}>
                                    {activeNav.charAt(0).toUpperCase()+activeNav.slice(1)} — coming soon
                                </div>
                            )}
                        </div>
                    </div>
                </ThemeCtx.Provider>
            );
        }

        // --- Entry Point Wrapper ---
        const rootElement = document.getElementById('react-app-container');
        const root = ReactDOM.createRoot(rootElement);
        
        const AppWrapper = () => {
            const [isDark, setIsDark] = useState(true);
            return (
                <div style={{ position: 'relative', width: '100%', height: '100vh', overflow: 'hidden' }}>
                    <StudioApp isDark={isDark} setIsDark={setIsDark} />
                </div>
            );
        };

        root.render(<AppWrapper />);
    </script>
</body>
</html>

            const apiKey = ""; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                systemInstruction: { parts: [{ text: "你是一个名为 GIGA Agent 的资深AI创意广告总监。你专注于TikTok等平台的电商场景。请根据用户的需求和提供的参考策略，给出精简、专业、具有洞察力的创意建议或修改方案。回复语言为中文。尽量简短且排版清晰，可以使用 Markdown 语法如加粗等。" }] }
            };

            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < 6; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，我暂时无法生成内容。";
                } catch (error) {
                    if (i === 5) return "网络请求超时，请稍后再试。";
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }
        };

            { key:"cpi-asc",   label:"CPI ↓" },
            { key:"trend-desc",label:"Trend ↓" },
        ];

            const T = useTheme();
            const [activeTab, setActiveTab] = useState(0);
            const [keyword, setKeyword]     = useState("");
            const [sortKey, setSortKey]     = useState("dnu-desc");
            const [sortOpen, setSortOpen]   = useState(false);
            const [hovered, setHovered]     = useState(null);
            const [visible, setVisible]     = useState(new Set());

            useEffect(() => {
                setVisible(new Set());
                const filtered = INSIGHTS_CARDS.filter(c => c.tab === INSIGHT_TABS[activeTab]);
                filtered.forEach((c,i) => setTimeout(() => setVisible(v => new Set([...v, c.id])), i * 40));
            }, [activeTab]);

            const sorted = [...INSIGHTS_CARDS]
                .filter(c => c.tab === INSIGHT_TABS[activeTab])
                .filter(c => c.title.toLowerCase().includes(keyword.toLowerCase()) || c.sub.toLowerCase().includes(keyword.toLowerCase()))
                .sort((a,b) => {
                    if (sortKey==="dnu-desc")   return b.dnu - a.dnu;
                    if (sortKey==="dnu-asc")    return a.dnu - b.dnu;
                    if (sortKey==="cpi-asc")    return a.cpi - b.cpi;
                    if (sortKey==="trend-desc") return b.trend - a.trend;
                    return 0;
                });

            const sortLabel = SORT_OPTIONS.find(s => s.key===sortKey)?.label;

            return (
                <PageShell
                    title="Insights"
                    subtitle="Top-performing creatives ranked by DNU"
                    tabs={INSIGHT_TABS}
                    activeTab={activeTab}
                    onTab={setActiveTab}
                    action={
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:6, background:T.bgSubtle, border:`1px solid ${T.border}`, borderRadius:8, padding:"6px 11px" }}>

                                <input value={keyword} onChange={e => setKeyword(e.target.value)} placeholder="Search…"
                                    style={{ border:"none", outline:"none", background:"none", fontSize:12, color:T.text, width:120 }} />
                                {keyword && <button onClick={() => setKeyword("")} style={{ background:"none", border:"none", cursor:"pointer", color:T.textMuted, fontSize:11, padding:0 }}>✕</button>}
                            </div>
                            <div style={{ position:"relative" }}>
                                <button onClick={() => setSortOpen(o => !o)} style={{ display:"flex", alignItems:"center", gap:5, padding:"6px 11px", borderRadius:8, border:`1px solid ${T.border}`, background:T.bgSubtle, color:T.textSub, fontSize:12, cursor:"pointer", whiteSpace:"nowrap" }}>
                                    {sortLabel} <span style={{ fontSize:8, opacity:0.4, transform:sortOpen?"rotate(180deg)":"none", transition:"transform 0.2s", display:"inline-block" }}>▼</span>
                                </button>

                                    <div style={{ position:"absolute", top:"calc(100% + 5px)", right:0, zIndex:30, background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, padding:4, minWidth:110, boxShadow:`0 8px 24px rgba(0,0,0,${T.dark?0.6:0.12})` }}>

                        </div>
                    }

                    <div onClick={() => setSortOpen(false)}>
                        {sorted.length===0 ? (
                            <div style={{ display:"flex", flexDirection:"column", alignItems:"center", paddingTop:80, gap:10, color:T.textMuted }}>

                                <button onClick={() => setKeyword("")} style={{ fontSize:12, color:T.textMuted, background:"none", border:`1px solid ${T.border}`, padding:"5px 12px", borderRadius:6, cursor:"pointer", marginTop:4 }}>Clear</button>

                                        <div key={card.id} onMouseEnter={() => setHovered(card.id)} onMouseLeave={() => setHovered(null)} style={{
                                            background:T.surface, border:`1px solid ${isHov?T.borderHover:T.border}`,
                                            borderRadius:14, overflow:"hidden", cursor:"pointer",
                                            opacity:isVis?1:0, transform:isVis?"translateY(0)":"translateY(10px)",
                                            transition:`opacity 0.28s ${idx*0.03}s, transform 0.28s ${idx*0.03}s, box-shadow 0.15s, border-color 0.15s`,

                                                <div style={{ fontSize:13, fontWeight:600, color:T.text, marginBottom:3, lineHeight:1.3 }}>{card.title}</div>

                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                    </div>

        // ─── Groot Session Home ───

                             (activeAgent === "Incentive玩法Agent" && (gameplaySelection || modulesSelection.length > 0));

            );
        };

        // ─── Groot Canvas ───
        function GrootCanvas({ historyId, historyItem, onBack, isAgentChatOpen, setIsAgentChatOpen }) {
            const T = useTheme();
            
            // Interactive nodes state mapping
            const [canvasNodes, setCanvasNodes] = useState(() => makeNodes(historyId));
            const [canvasEdges, setCanvasEdges] = useState(() => EDGES[historyId] || []);
            const [selectedNode, setSelectedNode] = useState(null);

            // -- Canvas Pan & Zoom State --
            const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
            const [isPanning, setIsPanning] = useState(false);
            const [isSpaceDown, setIsSpaceDown] = useState(false);
            const canvasRef = useRef(null);
            const panStart = useRef({ x: 0, y: 0 });

            // -- Node Drag State --
            const [positions, setPositions] = useState(() => Object.fromEntries(canvasNodes.map(n => [n.id, {x:n.x, y:n.y}])));
            const [dragging, setDragging] = useState(null);
            const dragOffset = useRef({});
            
            // Environment modes
            const isPromoDataAgent = historyId === "promo_data_agent";
            const isShopMockupAgent = historyId === "shop_mockup_agent";
            const isIncentiveAgent = historyId === "incentive_agent_canvas";
            const isStandard = !isPromoDataAgent && !isShopMockupAgent && !isIncentiveAgent;
            
            const [reference, setReference] = useState(null);
            const [chatInput, setChatInput] = useState("");
            
            // Sync specific canvas properties
            const [activeAgent, setActiveAgent] = useState(() => {
                if (isPromoDataAgent) return "推广图Agent";
                if (isShopMockupAgent) return "商店图Agent";
                if (isIncentiveAgent) return "Incentive玩法Agent";
                return "标准模式";
            });
            const [dataAgentActive, setDataAgentActive] = useState(isPromoDataAgent);
            const [mockupOpen, setMockupOpen] = useState(false);
            const [mockupSelection, setMockupSelection] = useState(isShopMockupAgent ? "Main ROW" : "");
            const [gameplayOpen, setGameplayOpen] = useState(false);
            const [gameplaySelection, setGameplaySelection] = useState(isIncentiveAgent ? "冲榜" : "");
            const [modulesOpen, setModulesOpen] = useState(false);
            const [modulesSelection, setModulesSelection] = useState(isIncentiveAgent ? ["Feed banner"] : []);
            const [modeOpen, setModeOpen] = useState(false);

            // ── Gemini Chat State ──
            const [chatHistory, setChatHistory] = useState(() => {
                if (isPromoDataAgent) {
                    return [{ role: 'assistant', text: '已为您应用 **Top-DNU 数据智荐** 策略。\n\n分析近期高转化素材发现，使用高对比度色彩和放大产品特写能提升 **15%** 的点击率。已在左侧画布中为您提取符合该策略的视觉特征，您可以直接点击左侧图片引用为生成参考。' }];
                } else if (isShopMockupAgent) {
                    return [{ role: 'assistant', text: '已为您应用 **商店图 Agent** 策略。\n\n根据所选的 Mock up 布局，已生成 4 张 9:16 竖版矩阵预览图。您可以悬停在图片上使用快捷编辑工具，或直接向我发送修改指令。' }];
                } else if (isIncentiveAgent) {
                    return [{ role: 'assistant', text: '已为您应用 **Incentive 玩法 Agent** 策略。\n\n根据您选择的玩法和模块，已在画布中生成 10 张正方形（1:1）素材。您可以直接点击每张图下方的 Prompt 进行单独的修改并重新生成。' }];
                } else {
                    return [{ role: 'assistant', text: '你好！我是 GIGA Agent。需要对当前画布中的节点或排版做些什么调整吗？' }];
                }
            });
            const [isGenerating, setIsGenerating] = useState(false);
            const chatEndRef = useRef(null);

            const selNode = canvasNodes.find(n => n.id===selectedNode);

            // Spacebar detection for panning
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.code === 'Space' && !isSpaceDown && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                        e.preventDefault();
                        setIsSpaceDown(true);
                    }
                };
                const handleKeyUp = (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        setIsSpaceDown(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                }
            }, [isSpaceDown]);

            // Mouse Wheel for Zoom/Pan
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const handleWheel = (e) => {
                    e.preventDefault();
                    if (e.ctrlKey || e.metaKey) {
                        const scaleBy = Math.exp(-e.deltaY / 200);
                        setTransform(prev => {
                            let newScale = prev.scale * scaleBy;
                            newScale = Math.min(Math.max(0.05, newScale), 5);
                            const rect = canvas.getBoundingClientRect();
                            const mx = e.clientX - rect.left;
                            const my = e.clientY - rect.top;
                            const newX = mx - (mx - prev.x) / prev.scale * newScale;
                            const newY = my - (my - prev.y) / prev.scale * newScale;
                            return { x: newX, y: newY, scale: newScale };
                        });
                    } else {
                        setTransform(prev => ({
                            ...prev,
                            x: prev.x - e.deltaX,
                            y: prev.y - e.deltaY
                        }));
                    }
                };
                canvas.addEventListener('wheel', handleWheel, { passive: false });
                return () => canvas.removeEventListener('wheel', handleWheel);
            }, [isStandard, isShopMockupAgent, isIncentiveAgent, isPromoDataAgent]);

            // Initial centering
            useEffect(() => {
                if (isShopMockupAgent) {
                    setTransform({ x: 50, y: 100, scale: 0.8 });
                } else if (isIncentiveAgent) {
                    setTransform({ x: 50, y: 50, scale: 0.85 });
                } else if (isPromoDataAgent) {
                    setTransform({ x: 0, y: 0, scale: 1 });
                } else {
                    setTransform({ x: 0, y: 0, scale: 1 });
                }
            }, [historyId]);

            // Mouse events for Canvas Pan & Node Drag
            const onCanvasMouseDown = useCallback((e) => {
                if (e.button === 0 || e.button === 1 || isSpaceDown) {
                    setIsPanning(true);
                    panStart.current = { x: e.clientX - transform.x, y: e.clientY - transform.y };
                    setSelectedNode(null);
                }
            }, [transform, isSpaceDown]);

            const onNodeMouseDown = useCallback((e, nodeId) => {
                e.stopPropagation(); 
                const pos = positions[nodeId];
                const nodeScreenX = transform.x + pos.x * transform.scale;
                const nodeScreenY = transform.y + pos.y * transform.scale;
                dragOffset.current = { dx: e.clientX - nodeScreenX, dy: e.clientY - nodeScreenY };
                setDragging(nodeId);
                setSelectedNode(nodeId);
            }, [positions, transform]);

            useEffect(() => {
                const onMove = (e) => {
                    if (dragging) {
                        setPositions(p => ({
                            ...p,
                            [dragging]: {
                                x: (e.clientX - dragOffset.current.dx - transform.x) / transform.scale,
                                y: (e.clientY - dragOffset.current.dy - transform.y) / transform.scale
                            }
                        }));
                    } else if (isPanning) {
                        setTransform(prev => ({
                            ...prev,
                            x: e.clientX - panStart.current.x,
                            y: e.clientY - panStart.current.y
                        }));
                    }
                };
                const onUp = () => {
                    setDragging(null);
                    setIsPanning(false);
                };
                window.addEventListener("mousemove", onMove);
                window.addEventListener("mouseup", onUp);
                return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
            }, [dragging, isPanning, transform]);

            // Scroll Chat to bottom
            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [chatHistory, isGenerating, isAgentChatOpen]);

            const handleRecClick = (item) => {
                setReference(item);
                if (!isAgentChatOpen) setIsAgentChatOpen(true);
                setChatInput(`参考该图策略：${item.prompt}`);
            };

            const handleSendMessage = async () => {
                if (!chatInput.trim() && !reference) return;

                const userText = chatInput;
                const refText = reference ? `\n[附带参考策略]：${reference.prompt} (洞察: ${reference.insight})` : "";
                const fullPrompt = userText + refText;

                const newUserMsg = { role: 'user', text: userText, reference: reference };
                setChatHistory(prev => [...prev, newUserMsg]);
                setChatInput("");
                setReference(null);
                setIsGenerating(true);

                const responseText = await generateWithGemini(`User Request: ${fullPrompt}`);

                setChatHistory(prev => [...prev, { role: 'assistant', text: responseText }]);
                setIsGenerating(false);
            };

            const handleCopyrightVerify = () => {
                const newUserMsg = { role: 'user', text: "对当前选中的商店图进行版权验证。" };
                setChatHistory(prev => [...prev, newUserMsg]);
                setIsGenerating(true);
                setTimeout(() => {
                    setChatHistory(prev => [...prev, { role: 'assistant', text: "已为您启动版权风险分析。正在通过 AI 检索并比对图中元素的商用授权情况...\n\n✅ 🛡️ **验证通过**：暂未发现明显的字体、人物肖像或设计素材侵权风险，可安全用于商业投放。" }]);
                    setIsGenerating(false);
                }, 1500);
            };

            // Pull out new node logic
            const spawnChildNode = (parentId) => {
                const parentPos = positions[parentId];
                const parentNode = canvasNodes.find(n => n.id === parentId);
                const newId = 'n_' + Date.now();
                const newNode = {
                    id: newId,
                    label: "Edit Variation",
                    type: "edit",
                    width: 240,
                    imgHeight: 180,
                    color: parentNode.color || T.bgSubtle,
                    prompt: parentNode.prompt || ""
                };
                setCanvasNodes(prev => [...prev, newNode]);
                setPositions(prev => ({...prev, [newId]: { x: parentPos.x + (parentNode.width||180) + 60, y: parentPos.y }}));
                setCanvasEdges(prev => [...prev, [parentId, newId]]);
                setSelectedNode(newId);
            };

            // Incentive Prompt Editing Logic
            const handlePromptEditToggle = (id) => {
                setCanvasNodes(prev => prev.map(img => img.id === id ? { ...img, isEditing: true } : img));
            };

            const handlePromptSubmit = (id, newPrompt) => {
                setCanvasNodes(prev => prev.map(img => img.id === id ? { ...img, prompt: newPrompt, isEditing: false, isLoading: true } : img));
                setTimeout(() => {
                    setCanvasNodes(prev => prev.map(img => img.id === id ? { ...img, isLoading: false, color: "#" + Math.floor(Math.random()*16777215).toString(16) } : img));
                }, 1500); 
            };

            const rightPanelWidth = isAgentChatOpen ? 340 : (isStandard ? 256 : 0);

            return (
                <div style={{ display:"flex", height:"100vh", fontFamily:T.sans }}>
                    
                    {/* LEFT / CENTER: Dynamic Canvas Area */}
                    <div style={{ flex: 1, position: "relative", overflow: "hidden", backgroundColor: T.pageBg }}>
                        
                        {/* Universal Top Toolbar */}
                        <UniversalCanvasToolbar title={historyItem?.name} onBack={onBack} />

                        {/* Interactive Zoom/Pan Wrapper for Standard, Promo Data Agent, Shop Mockup & Incentive */}
                        {(isStandard || isPromoDataAgent || isShopMockupAgent || isIncentiveAgent) && (
                            <div
                                ref={canvasRef}
                                onMouseDown={onCanvasMouseDown}
                                style={{ position: "absolute", inset: 0, cursor: isPanning ? "grabbing" : (isSpaceDown ? "grab" : "default"), overflow: "hidden" }}
                            >
                                {/* Background Pattern */}
                                <div style={{
                                    position: "absolute", inset: 0,
                                    backgroundImage:`radial-gradient(circle, ${T.canvasDot} 1px, transparent 1px)`,
                                    backgroundSize:`${24 * transform.scale}px ${24 * transform.scale}px`,
                                    backgroundPosition: `${transform.x}px ${transform.y}px`,
                                    backgroundColor: T.dark ? "#080810" : T.canvasBg,
                                    backgroundBlendMode: T.dark ? "screen" : "normal",
                                    pointerEvents: "none"
                                }} />

                                {/* Transform Container */}
                                <div style={{
                                    position: "absolute", top: 0, left: 0,
                                    transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`,
                                    transformOrigin: "0 0",
                                    width: "100%", height: "100%"
                                }}>
                                    <svg style={{ position:"absolute", top:0, left:0, overflow:"visible", pointerEvents:"none" }}>
                                        {canvasEdges.map(([from,to],i) => {
                                            const a=positions[from], b=positions[to];
                                            if (!a||!b) return null;
                                            const aNode = canvasNodes.find(n => n.id === from);
                                            const ax=a.x + (aNode?.width || 180), ay=a.y + (aNode?.imgHeight ? aNode.imgHeight/2 : 28);
                                            const bx=b.x, by=b.y + (aNode?.imgHeight ? aNode.imgHeight/2 : 28);
                                            const cx=(ax+bx)/2;
                                            return <path key={i} d={`M ${ax} ${ay} C ${cx} ${ay}, ${cx} ${by}, ${bx} ${by}`} fill="none" stroke={T.borderHover} strokeWidth="2" />;
                                        })}
                                    </svg>
                                    
                                    {isShopMockupAgent && (
                                        <div style={{ display: "flex", gap: 60, padding: "120px 100px", alignItems: "center" }}>
                                            {[1, 2, 3, 4].map(idx => (
                                                <div key={idx} className="group" style={{
                                                    width: 320, height: 568, position: "relative", borderRadius: 16,
                                                    overflow: "hidden", border: `1px solid ${T.border}`,
                                                    background: T.surfaceHover, boxShadow: `0 12px 32px rgba(0,0,0,${T.dark?0.5:0.1})`
                                                }}>
                                                    <div style={{ position: "absolute", inset: 0, background: T.dark ? "#161620" : "#e0e7ff", display: "flex", alignItems: "center", justifyContent: "center", color: T.textMuted, fontSize: 13, flexDirection: "column", gap: 10 }}>
                                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                                                                                            </div>
                                                    {/* Hover Menu */}
                                                    <div className="absolute top-4 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-20 flex flex-wrap justify-center gap-1.5 bg-black/80 backdrop-blur-md px-2.5 py-2 rounded-xl border border-white/10" style={{ width: "90%", boxShadow: "0 4px 12px rgba(0,0,0,0.5)" }}>
                                                        {["HD", "文字编辑", "图层分离", "控制角度", "精准修改", "视频生成"].map(tool => (
                                                            <button key={tool} style={{ padding: "4px 8px", fontSize: 10, color: "#fff", background: "transparent", border: "none", cursor: "pointer", borderRadius: 6, whiteSpace: "nowrap", transition: "background 0.2s" }} onMouseEnter={e => e.currentTarget.style.background="rgba(255,255,255,0.2)"} onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                                                                {tool}
                                                            </button>
                                                        ))}
                                                    </div>
                                                    <div style={{ position: "absolute", top: 10, left: "50%", transform: "translateX(-50%)", width: 40, height: 4, background: "rgba(255,255,255,0.2)", borderRadius: 4, pointerEvents: "none" }} />
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Standard / Promo / Incentive nodes mapped */}
                                    {(isStandard || isPromoDataAgent || isIncentiveAgent) && canvasNodes.map(node => {
                                        const pos = positions[node.id];
                                        const isSel = selectedNode===node.id;
                                        const width = node.width || 180;
                                        const imgHeight = node.imgHeight || 90;
                                        const isEditType = node.type === "edit";

                                        return (
                                            <div
                                                key={node.id}
                                                className="group"
                                                onMouseDown={e => onNodeMouseDown(e, node.id)}
                                                onDoubleClick={() => {
                                                    if (isPromoDataAgent && (node.type === "promo_rec" || node.type === "edit")) {
                                                        handleRecClick({ color: node.color, prompt: node.prompt || "", insight: node.insight || "" });
                                                    }
                                                }}
                                                style={{
                                                position:"absolute", left:pos.x, top:pos.y, width:width,
                                                background:T.surface, border:`1.5px solid ${isSel?T.text:T.border}`,
                                                borderRadius:12, overflow:"visible",
                                                cursor:dragging===node.id?"grabbing":"grab",
                                                boxShadow:isSel?`0 0 0 3px rgba(${T.dark?"240,239,240":"28,25,23"},0.1),0 4px 16px rgba(0,0,0,${T.dark?0.5:0.1})`:`0 2px 8px rgba(0,0,0,${T.dark?0.35:0.06})`,
                                                transition:dragging===node.id?"none":"border-color 0.15s,box-shadow 0.15s",
                                                userSelect:"none",
                                            }}>
                                                <div style={{ height:imgHeight, background:node.color||T.bgSubtle, position:"relative", borderRadius:"11px 11px 0 0", overflow:"hidden" }}>
                                                    {node.isLoading && <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",color:"white"}}><span className="animate-spin text-2xl">✨</span></div>}
                                                    {!node.isLoading && (
                                                        <React.Fragment>
                                                            <div style={{ position:"absolute", inset:0, background:"radial-gradient(ellipse at 40% 40%,rgba(255,255,255,0.18),transparent 70%)" }} />
                                                            {node.type==="root" && <div style={{ position:"absolute", top:6, left:6, background:"rgba(0,0,0,0.25)", backdropFilter:"blur(6px)", color:"rgba(255,255,255,0.9)", fontSize:9, fontWeight:600, padding:"2px 6px", borderRadius:4, fontFamily:T.mono }}>ROOT</div>}
                                                            {!!node.insight && (
                                                                <div style={{ position: "absolute", top: 8, right: 8, background: "rgba(0,0,0,0.55)", color: "#fff", fontSize: 10, padding: "3px 7px", borderRadius: 6, backdropFilter: "blur(4px)" }}>
                                                                    {node.insight}
                                                                </div>
                                                            )}
                                                            {node.type==="square" && <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.4)",fontSize:12}}></div>}
                                                            {node.type==="edit" && <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.4)",fontSize:12}}></div>}
                                                        </React.Fragment>
                                                    )}
                                                </div>

                                                <div style={{ padding:"8px 10px 10px", background: T.surface, borderRadius:"0 0 11px 11px" }}>
                                                    {!isEditType && node.prompt ? (
                                                        <div style={{ background: T.surface, border: `1px solid ${T.borderHover}`, borderRadius: 8, padding: 12 }}>
                                                            {node.isEditing ? (
                                                                <textarea
                                                                    autoFocus
                                                                    defaultValue={node.prompt}
                                                                    onBlur={(e) => handlePromptSubmit(node.id, e.target.value)}
                                                                    onKeyDown={(e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); handlePromptSubmit(node.id, e.target.value); } }}
                                                                    style={{ width: "100%", background: "transparent", border: "none", outline: "none", color: T.text, fontSize: 11, resize: "none", lineHeight: 1.5 }}
                                                                    rows={3}
                                                                />
                                                            ) : (
                                                                <div onClick={(e) => { e.stopPropagation(); handlePromptEditToggle(node.id); }} style={{ fontSize: 11, color: T.textMuted, lineHeight: 1.5, cursor: "text" }}>
                                                                    {node.prompt}
                                                                    <div style={{ color: T.purple, fontSize: 10, marginTop: 6, display: "flex", alignItems: "center", gap: 4 }}>
                                                                        <span>✎ 点击修改 Prompt</span>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    ) : isEditType ? (
                                                        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                                                            <div style={{ display: 'flex', gap: 6, padding: '4px 0' }}>
                                                                <div style={{ width: 24, height: 24, background: '#f59e0b', borderRadius: 4 }}></div>
                                                                <div style={{ width: 24, height: 24, border: `1px dashed ${T.borderHover}`, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center', color: T.textMuted }}>+</div>
                                                            </div>
                                                            <textarea
                                                                defaultValue={node.prompt}
                                                                onBlur={(e) => handlePromptSubmit(node.id, e.target.value)}
                                                                onKeyDown={(e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); handlePromptSubmit(node.id, e.target.value); } }}
                                                                placeholder="Create with your ideas..."
                                                                style={{ width: "100%", background: "transparent", border: `1px solid ${T.border}`, borderRadius: 6, padding: 6, outline: "none", color: T.text, fontSize: 11, resize: "none", lineHeight: 1.5 }}
                                                                rows={3}
                                                            />
                                                            <button onClick={() => handlePromptSubmit(node.id, node.prompt)} style={{ width: "100%", height: 26, borderRadius: 6, background: T.text, color: T.bg, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontSize: 11, fontWeight: 500 }}>↑ Generate</button>
                                                        </div>
                                                    ) : (
                                                        <React.Fragment>
                                                            <div style={{ fontSize:11, fontWeight:500, color:T.text }}>{node.label}</div>
                                                            <div style={{ fontSize:9, color:T.textMuted, marginTop:2, fontFamily:T.mono }}>{node.type} · {node.width===240?"1:1":"9:16"}</div>
                                                        </React.Fragment>
                                                    )}
                                                </div>

                                                {/* Add Branch Handle */}
                                                <div 
                                                    className="opacity-0 group-hover:opacity-100 transition-opacity"
                                                    onClick={(e) => { e.stopPropagation(); spawnChildNode(node.id); }} 
                                                    style={{ position: 'absolute', right: -12, top: '50%', transform: 'translateY(-50%)', width: 24, height: 24, background: T.surface, border: `1px solid ${T.borderHover}`, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', zIndex: 20, fontSize: 16, color: T.text, boxShadow: `0 2px 8px rgba(0,0,0,0.5)` }}
                                                >
                                                    +
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Promo Data Agent Overlay Intro (not scaled) */}
                                {isPromoDataAgent && (
                                    <div style={{ position: "absolute", top: 76, left: 32, right: 32, pointerEvents: "none" }}>
                                        <div style={{ maxWidth: 980 }}>
                                            <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 16 }}>
                                                <div>
                                                    <div style={{ fontSize: 26, fontFamily: T.serif, color: T.text, marginBottom: 8 }}>推广图策略推荐 (Data-Driven Promos)</div>
                                                    <div style={{ fontSize: 13, color: T.textMuted, lineHeight: 1.6, maxWidth: 900 }}>
                                                        基于 <b style={{ color: T.purple }}>Top-DNU 数据智荐</b> 策略，系统为您检索了近期表现最佳的过往创意，并提取了核心视觉特征与 Prompt。<b>双击</b>任意节点可将策略引用至右侧对话框；每张图右侧的 <b>+</b> 可链接出新的节点分支。
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Floating Toggle Button (visible if Right Panel is fully collapsed) */}
                        {!isAgentChatOpen && rightPanelWidth === 0 && (

        // ─── Studio App ───
        function StudioApp({ isDark, setIsDark }) {
            const [activeNav, setActiveNav] = useState("groot");
            const [activeGroot, setActiveGroot] = useState(null);
            const [grootView, setGrootView] = useState("home");
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
            const [isAgentChatOpen, setIsAgentChatOpen] = useState(false);
            
            const tokens = makeTokens(isDark);
            const toggleDark = () => setIsDark(d => !d);
            const sidebarW = sidebarCollapsed ? SIDEBAR_CW : SIDEBAR_W;

            const handleOpenCanvas = (id) => { setActiveGroot(id); setGrootView("canvas"); };
            const handleSelectSession = (id) => { setActiveGroot(id); setGrootView("home"); };
            
            const handleStartGeneration = (prompt, agent, useDataAgent, mockupSelection, gameplaySelection, modulesSelection) => {
                if (agent === "推广图Agent" && useDataAgent) {
                    setActiveGroot("promo_data_agent");
                    setGrootView("canvas");
                    setSidebarCollapsed(true);
                    setIsAgentChatOpen(true);
                } 
                else if (agent === "商店图Agent" && mockupSelection) {
                    setActiveGroot("shop_mockup_agent");
                    setGrootView("canvas");
                    setSidebarCollapsed(true);
                    setIsAgentChatOpen(true);
                }
                else if (agent === "Incentive玩法Agent" && (gameplaySelection || modulesSelection.length > 0)) {
                    setActiveGroot("incentive_agent_canvas");
                    setGrootView("canvas");
                    setSidebarCollapsed(true);
                    setIsAgentChatOpen(true);
                } else {
                    setActiveGroot("g1");
                    setGrootView("canvas");
                    setSidebarCollapsed(false);
                    setIsAgentChatOpen(false); 
                }
            };

            let activeSession = GROOT_HISTORY.find(g => g.id === activeGroot) || null;
            if (activeGroot === "promo_data_agent") {
                activeSession = { id: "promo_data_agent", name: "推广策略推荐 Canvas", time: "Just now", nodeCount: 10, status: "running" };
            } else if (activeGroot === "shop_mockup_agent") {
                activeSession = { id: "shop_mockup_agent", name: "商店图 Mock up", time: "Just now", nodeCount: 4, status: "running" };
            } else if (activeGroot === "incentive_agent_canvas") {
                activeSession = { id: "incentive_agent_canvas", name: "Incentive 素材矩阵", time: "Just now", nodeCount: 10, status: "running" };
            }

            const isCanvasView = activeNav==="groot" && grootView==="canvas" && activeGroot;

            return (
                <ThemeCtx.Provider value={tokens}>
                    <div style={{ display:"flex", height:"100vh", background:tokens.bg, fontFamily:tokens.sans, transition:"background 0.25s", color: tokens.text }}>
                        <Sidebar
                            collapsed={sidebarCollapsed}
                            onToggleCollapse={() => setSidebarCollapsed(c => !c)}
                            activeNav={activeNav}
                            setActiveNav={(k) => { setActiveNav(k); if (k!=="groot") { setActiveGroot(null); setGrootView("home"); setIsAgentChatOpen(false); } }}
                            grootHistory={GROOT_HISTORY}
                            activeGroot={activeGroot}
                            setActiveGroot={setActiveGroot}
                            grootView={grootView}
                            setGrootView={setGrootView}
                            isDark={isDark}
                            toggleDark={toggleDark}
                            isAgentChatOpen={isAgentChatOpen}
                        />
                        <div style={{
                            marginLeft: sidebarW, flex:1, height:"100vh",
                            overflow: isCanvasView || ["insights","production","automation","aigclab"].includes(activeNav) ? "hidden" : "auto",
                            background: tokens.pageBg,
                            transition:"margin-left 0.22s cubic-bezier(0.4,0,0.2,1), background 0.25s",
                        }}>
                            {activeNav==="groot" && grootView==="home" && (
                                <GrootSessionHome
                                    session={activeSession && !["promo_data_agent", "shop_mockup_agent", "incentive_agent_canvas"].includes(activeSession.id) ? activeSession : null}
                                    history={GROOT_HISTORY}
                                    onOpenCanvas={handleOpenCanvas}
                                    onSelectSession={handleSelectSession}
                                    onStartGeneration={handleStartGeneration}
                                />
                            )}
                            {isCanvasView && (
                                <GrootCanvas
                                    historyId={activeGroot}
                                    historyItem={activeSession}
                                    onBack={() => { setActiveGroot(null); setGrootView("home"); setIsAgentChatOpen(false); }}
                                    isAgentChatOpen={isAgentChatOpen}
                                    setIsAgentChatOpen={setIsAgentChatOpen}
                                />
                            )}
                            {activeNav==="insights"   && <InsightsView/>}
                            {activeNav==="production" && <ProductionView/>}
                            {activeNav==="automation" && <AutomationView/>}
                            {activeNav==="aigclab"    && <AIGCLabView/>}
                            {!["insights","groot","production","automation","aigclab"].includes(activeNav) && (
                                <div style={{ padding:"40px", color:tokens.textMuted, fontSize:14 }}>
                                    {activeNav.charAt(0).toUpperCase()+activeNav.slice(1)} — coming soon
                                </div>
                            )}
                        </div>
                    </div>
                </ThemeCtx.Provider>
            );
        }

        // --- Entry Point Wrapper ---
        const rootElement = document.getElementById('react-app-container');
        const root = ReactDOM.createRoot(rootElement);
        
        const AppWrapper = () => {
            const [isDark, setIsDark] = useState(true);
            return (
                <div style={{ position: 'relative', width: '100%', height: '100vh', overflow: 'hidden' }}>
                    <StudioApp isDark={isDark} setIsDark={setIsDark} />
                </div>
            );
        };

        root.render(<AppWrapper />);
    </script>
</body>
</html>
